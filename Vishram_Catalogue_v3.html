<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vishram Spices - Product Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--dark:#1B3A2D;--gold:#C8860A;--cream:#FDF6EC;--spice:#8B3A0F;--light:#F5EFE6;--border:#E0C89A;--text:#2C1810;--muted:#7A6552;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;}
.header{background:var(--dark);padding:20px 16px 16px;text-align:center;}
.header-logo{width:100px;height:100px;object-fit:contain;background:white;border-radius:50%;padding:8px;border:3px solid var(--gold);margin-bottom:10px;display:block;margin-left:auto;margin-right:auto;}
.header-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:1px;}
.header-sub{font-size:10px;color:#9FE1CB;letter-spacing:2px;margin-top:2px;}
.header-divider{width:50px;height:1px;background:var(--gold);margin:8px auto;}
.header-tagline{font-size:11px;color:var(--gold);font-style:italic;}
.stats-bar{background:var(--spice);display:flex;justify-content:space-around;padding:10px 0;}
.stat{text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#fff;}
.stat-label{font-size:9px;color:#f5c89a;letter-spacing:1px;text-transform:uppercase;}
.search-wrap{padding:10px 12px;background:var(--light);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.search-box{display:flex;align-items:center;background:white;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;gap:8px;}
.search-box input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);width:100%;background:transparent;}
.search-box input::placeholder{color:#b0a090;}
.clear-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;display:none;padding:0 4px;}
.cat-scroll{padding:10px 12px;overflow-x:auto;display:flex;gap:8px;background:var(--cream);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;}
.cat-pill.active{background:var(--dark);border-color:var(--dark);color:white;}
.results-bar{padding:8px 14px;font-size:12px;color:var(--muted);background:var(--cream);border-bottom:1px solid var(--border);}
.results-bar span{color:var(--dark);font-weight:500;}
.cat-section{margin-bottom:4px;}
.cat-header{background:var(--dark);padding:9px 14px;display:flex;align-items:center;gap:8px;}
.cat-emoji{font-size:15px;}
.cat-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:white;}
.cat-count{margin-left:auto;background:rgba(255,255,255,0.15);color:#9FE1CB;font-size:11px;padding:2px 8px;border-radius:10px;}
.products-grid{padding:6px;display:flex;flex-direction:column;gap:5px;background:var(--light);}
.product-card{background:white;border-radius:8px;border:1px solid var(--border);padding:11px 12px;display:flex;align-items:flex-start;gap:10px;}
.product-info{flex:1;min-width:0;}
.product-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
.product-name mark{background:#FFF3CD;color:var(--spice);border-radius:2px;padding:0 1px;}
.product-brands{font-size:11px;color:var(--dark);font-weight:500;margin-top:2px;}
.product-brands span{color:var(--muted);font-weight:400;}
.product-notes{font-size:11px;color:var(--muted);line-height:1.4;margin-top:1px;}
.vishram-badge{display:inline-block;background:#E8F5E9;color:var(--dark);font-size:9px;font-weight:500;padding:1px 6px;border-radius:8px;border:1px solid #A5D6A7;margin-top:3px;}
.cart-items-badge{display:inline-block;background:var(--gold);color:white;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-top:3px;margin-left:4px;}
.add-btn{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:var(--dark);border:none;color:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;line-height:1;}
.add-btn.has-items{background:var(--gold);}
.no-results{text-align:center;padding:60px 20px;display:none;}
.no-results-icon{font-size:36px;margin-bottom:10px;}
.no-results h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);margin-bottom:5px;}
.no-results p{font-size:13px;color:var(--muted);}
/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:white;border-top:1px solid var(--border);}
.cart-bar{display:none;padding:8px 12px;background:var(--dark);cursor:pointer;}
.cart-bar-inner{display:flex;align-items:center;gap:10px;}
.cart-badge{background:var(--gold);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:22px;text-align:center;}
.cart-label{color:white;font-size:14px;font-weight:500;flex:1;}
.cart-preview{color:#9FE1CB;font-size:11px;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wa-btn-wrap{padding:10px 12px;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#25D366;color:white;border:none;border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;}
.wa-btn svg{width:20px;height:20px;fill:white;flex-shrink:0;}
.content-wrap{padding-bottom:140px;}
/* POPUP OVERLAY */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-end;}
.popup-overlay.show{display:flex;}
.popup{background:white;border-radius:20px 20px 0 0;width:100%;padding:0 0 20px;max-height:90vh;overflow-y:auto;}
.popup-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.popup-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--dark);flex:1;line-height:1.3;}
.popup-close{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
.popup-body{padding:14px 16px;}
.field-label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.field-group{margin-bottom:14px;}
.brand-options{display:flex;flex-wrap:wrap;gap:8px;}
.brand-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
.brand-btn.selected{background:var(--dark);border-color:var(--dark);color:white;}
.size-options{display:flex;flex-wrap:wrap;gap:8px;}
.size-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;}
.size-btn.selected{background:var(--spice);border-color:var(--spice);color:white;}
.vishram-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;}
.vishram-input:focus{border-color:var(--dark);}
.qty-row{display:flex;align-items:center;gap:12px;}
.qty-field{display:flex;align-items:center;gap:0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;flex:1;}
.qty-minus,.qty-plus{width:44px;height:44px;background:var(--light);border:none;font-size:22px;cursor:pointer;color:var(--dark);font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-input{flex:1;border:none;outline:none;font-size:17px;font-weight:600;color:var(--dark);text-align:center;font-family:'DM Sans',sans-serif;min-width:0;padding:0 4px;}
.add-to-order-btn{width:100%;background:var(--dark);color:white;border:none;border-radius:12px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;}
.add-to-order-btn:disabled{background:#ccc;cursor:not-allowed;}
/* CART MODAL */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;}
.cart-modal{position:fixed;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;z-index:500;max-height:80vh;display:none;flex-direction:column;}
.cart-modal.show{display:flex;}
.cart-modal-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-modal-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--dark);}
.cart-close{background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;padding:0;}
.cart-modal-body{overflow-y:auto;flex:1;padding:8px 12px;}
.cart-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.cart-item:last-child{border-bottom:none;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:13px;font-weight:600;color:var(--text);}
.cart-item-detail{font-size:12px;color:var(--muted);margin-top:2px;}
.cart-item-remove{background:none;border:none;color:#dc3545;font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0;}
.cart-modal-footer{padding:12px;border-top:1px solid var(--border);}
.send-btn{width:100%;background:#25D366;color:white;border:none;border-radius:12px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.send-btn svg{width:20px;height:20px;fill:white;}
.empty-cart{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
</style>
</head>

var categoryEmojis={"Spices & Masalas":"&#127798;","Flours, Rice & Grains":"&#127806;","Pulses, Lentils & Dal":"&#129752;","Oils & Ghee":"&#129785;","Dry Fruits, Nuts & Seeds":"&#129392;","Sugar, Salt & Sweeteners":"&#127855;","Sauces, Pastes & Condiments":"&#129750;","Syrups, Crushes & Beverages":"&#129371;","Canned & Preserved Goods":"&#129483;","Bakery & Baking":"&#129473;","Pasta, Noodles & International":"&#127837;","Dairy & Protein":"&#129371;","Snacks & Farsan":"&#127871;","Ready Mixes & Premixes":"&#128230;","Breakfast & Cereals":"&#129379;","Housekeeping & Disposables":"&#129529;","Pooja & Religious":"&#129582;","Miscellaneous":"&#128203;"};
var categories=[...new Set(products.map(function(p){return p.cat;}))];
var currentCat="all",currentSearch="";
var cart=[];
var popupIdx=-1,selectedBrand="",selectedSize="";

function init(){
  var pills=document.getElementById("catPills");
  categories.forEach(function(cat){
    var pill=document.createElement("div");
    pill.className="cat-pill";
    pill.innerHTML=(categoryEmojis[cat]||"")+" "+cat;
    pill.onclick=function(){filterCat(cat,pill);};
    pills.appendChild(pill);
  });
  render();
}

function filterCat(cat,el){
  currentCat=cat;
  document.querySelectorAll(".cat-pill").forEach(function(p){p.classList.remove("active");});
  el.classList.add("active");
  render();
}

function clearSearch(){
  document.getElementById("searchInput").value="";
  currentSearch="";
  document.getElementById("clearBtn").style.display="none";
  render();
}

document.getElementById("searchInput").addEventListener("input",function(){
  currentSearch=this.value.toLowerCase().trim();
  document.getElementById("clearBtn").style.display=currentSearch?"block":"none";
  render();
});

function highlight(text,query){
  if(!query)return text;
  var regex=new RegExp("("+query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return text.replace(regex,"<mark>$1</mark>");
}

function getCartCountForProduct(idx){
  return cart.filter(function(item){return item.idx===idx;}).length;
}

function openPopup(idx){
  var p=products[idx];
  popupIdx=idx;
  selectedBrand="";
  selectedSize="";
  document.getElementById("popupTitle").textContent=p.name;
  document.getElementById("qtyInput").value=1;
  
  var brandOpts=document.getElementById("brandOptions");
  brandOpts.innerHTML="";
  
  var brandField=document.getElementById("brandField");
  brandField.style.display=p.parsed.length>1?"block":"none";
  
  if(p.parsed.length===1){
    selectedBrand=p.parsed[0].brand;
    showSizes(p.parsed[0]);
  } else {
    p.parsed.forEach(function(item){
      var btn=document.createElement("button");
      btn.className="brand-btn";
      btn.textContent=item.brand||"No Brand";
      btn.onclick=function(){
        document.querySelectorAll(".brand-btn").forEach(function(b){b.classList.remove("selected");});
        btn.classList.add("selected");
        selectedBrand=item.brand;
        selectedSize="";
        showSizes(item);
      };
      brandOpts.appendChild(btn);
    });
    document.getElementById("sizeField").style.display="none";
  }
  
  document.getElementById("popupOverlay").classList.add("show");
}

function showSizes(item){
  var sizeField=document.getElementById("sizeField");
  var sizeOpts=document.getElementById("sizeOptions");
  var vishramInput=document.getElementById("vishramInput");
  var sizeLabel=document.getElementById("sizeLabel");
  sizeField.style.display="block";
  sizeOpts.innerHTML="";
  
  if(item.sizes.length===1&&item.sizes[0]==="__vishram__"){
    sizeOpts.style.display="none";
    vishramInput.style.display="block";
    vishramInput.value="";
    vishramInput.placeholder="Type size/packing (e.g. 5kg, 500g, 10kg x 5 bags...)";
    sizeLabel.textContent="Specify Size / Packing";
    vishramInput.oninput=function(){selectedSize=this.value.trim();};
    vishramInput.focus();
  } else {
    sizeOpts.style.display="flex";
    vishramInput.style.display="none";
    sizeLabel.textContent="Select Pack Size";
    selectedSize="";
    item.sizes.forEach(function(size){
      var btn=document.createElement("button");
      btn.className="size-btn";
      btn.textContent=size;
      btn.onclick=function(){
        document.querySelectorAll(".size-btn").forEach(function(b){b.classList.remove("selected");});
        btn.classList.add("selected");
        selectedSize=size;
      };
      sizeOpts.appendChild(btn);
    });
  }
}

function changeQty(delta){
  var inp=document.getElementById("qtyInput");
  var val=parseInt(inp.value)||1;
  val=Math.max(1,val+delta);
  inp.value=val;
}

function confirmAdd(){
  var p=products[popupIdx];
  var qty=parseInt(document.getElementById("qtyInput").value)||1;
  if(!selectedSize&&p.parsed.some(function(x){return x.sizes[0]==="__vishram__"&&x.brand===selectedBrand;})){
    selectedSize=document.getElementById("vishramInput").value.trim();
  }
  if(p.parsed.length>1&&!selectedBrand){alert("Please select a brand.");return;}
  if(!selectedSize){alert("Please select or enter a pack size.");return;}
  
  var brandLabel=selectedBrand||"";
  var detail=(brandLabel?brandLabel+", ":"")+selectedSize+" x "+qty;
  cart.push({idx:popupIdx,name:p.name,brand:brandLabel,size:selectedSize,qty:qty,detail:detail});
  closePopupDirect();
  updateCartUI();
  render();
}

function closePopup(e){
  if(e.target===document.getElementById("popupOverlay"))closePopupDirect();
}
function closePopupDirect(){
  document.getElementById("popupOverlay").classList.remove("show");
  popupIdx=-1;
}

function updateCartUI(){
  var total=cart.length;
  var cartBar=document.getElementById("cartBar");
  var defaultWaBtn=document.getElementById("defaultWaBtn");
  if(total>0){
    cartBar.style.display="block";
    defaultWaBtn.style.display="none";
    document.getElementById("cartBadge").textContent=total+" item"+(total>1?"s":"");
    var names=cart.slice(0,2).map(function(i){return i.name.split(" ")[0];});
    document.getElementById("cartPreview").textContent=names.join(", ")+(cart.length>2?" +"+(cart.length-2)+" more":"");
  } else {
    cartBar.style.display="none";
    defaultWaBtn.style.display="block";
  }
}

function openCart(){
  var body=document.getElementById("cartBody");
  if(cart.length===0){
    body.innerHTML="<div class=\"empty-cart\">Your order is empty.<br>Tap + on any product to add.</div>";
  } else {
    body.innerHTML="";
    cart.forEach(function(item,i){
      var div=document.createElement("div");
      div.className="cart-item";
      div.innerHTML="<div class=\"cart-item-info\"><div class=\"cart-item-name\">"+item.name+"</div><div class=\"cart-item-detail\">"+item.detail+"</div></div><button class=\"cart-item-remove\" onclick=\"removeCartItem("+i+")\">&times;</button>";
      body.appendChild(div);
    });
  }
  document.getElementById("cartOverlay").style.display="block";
  document.getElementById("cartModal").classList.add("show");
}

function removeCartItem(i){
  cart.splice(i,1);
  updateCartUI();
  openCart();
  render();
}

function closeCart(){
  document.getElementById("cartOverlay").style.display="none";
  document.getElementById("cartModal").classList.remove("show");
}

function sendOnWhatsApp(){
  if(cart.length===0){alert("Your order is empty!");return;}
  var msg="*Order — Vishram Spices Catalogue*\n\n";
  cart.forEach(function(item,i){
    msg+=(i+1)+". "+item.name;
    if(item.brand)msg+=" ("+item.brand+")";
    msg+=" — "+item.size+" x "+item.qty+"\n";
  });
  msg+="\n_Sent via Vishram Spices Catalogue_";
  window.open("https://wa.me/919820131983?text="+encodeURIComponent(msg),"_blank");
  closeCart();
}

function render(){
  var wrap=document.getElementById("contentWrap");
  var noResults=document.getElementById("noResults");
  var filtered=products.filter(function(p){
    var matchCat=currentCat==="all"||p.cat===currentCat;
    var matchSearch=!currentSearch||p.name.toLowerCase().indexOf(currentSearch)>=0||p.brands.toLowerCase().indexOf(currentSearch)>=0||p.notes.toLowerCase().indexOf(currentSearch)>=0||p.cat.toLowerCase().indexOf(currentSearch)>=0;
    return matchCat&&matchSearch;
  });
  document.getElementById("resultsCount").textContent=filtered.length;
  wrap.querySelectorAll(".cat-section").forEach(function(el){el.remove();});
  noResults.style.display=filtered.length===0?"block":"none";
  if(filtered.length===0)return;
  var grouped={};
  filtered.forEach(function(p){
    var idx=products.indexOf(p);
    if(!grouped[p.cat])grouped[p.cat]=[];
    grouped[p.cat].push({p:p,idx:idx});
  });
  Object.keys(grouped).forEach(function(cat){
    var items=grouped[cat];
    var section=document.createElement("div");
    section.className="cat-section";
    var header=document.createElement("div");
    header.className="cat-header";
    header.innerHTML="<span class=\"cat-emoji\">"+(categoryEmojis[cat]||"")+"</span><span class=\"cat-name\">"+cat+"</span><span class=\"cat-count\">"+items.length+"</span>";
    section.appendChild(header);
    var grid=document.createElement("div");
    grid.className="products-grid";
    items.forEach(function(item){
      var p=item.p,idx=item.idx;
      var isVishram=p.brands.indexOf("Vishram")>=0;
      var cartCount=getCartCountForProduct(idx);
      var card=document.createElement("div");
      card.className="product-card";
      var badge=cartCount>0?"<span class=\"cart-items-badge\">"+cartCount+" in order</span>":"";
      card.innerHTML="<div class=\"product-info\"><div class=\"product-name\">"+highlight(p.name,currentSearch)+"</div>"+(p.brands?"<div class=\"product-brands\"><span>Brands: </span>"+highlight(p.brands,currentSearch)+"</div>":"")+(p.notes?"<div class=\"product-notes\">"+highlight(p.notes,currentSearch)+"</div>":"")+(isVishram?"<div class=\"vishram-badge\">&#10022; Vishram Brand Available</div>":"")+badge+"</div><button class=\"add-btn"+(cartCount>0?" has-items":"")+"\" onclick=\"openPopup("+idx+")\">+</button>";
      grid.appendChild(card);
    });
    section.appendChild(grid);
    wrap.insertBefore(section,noResults);
  });
}

init();
</script>
